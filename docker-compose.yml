version: '3.8'

services:
  # Backend API service
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MEMORY_DIR: /tmp/ai_memory
    volumes:
      - ai_memory:/tmp/ai_memory
    restart: always

  # Frontend service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://api:8000}
    depends_on:
      - api
    restart: always

volumes:
  ai_memory:
